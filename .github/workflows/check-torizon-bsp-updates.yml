name: check Torizon revision updates

on:
  workflow_call:
    inputs:
        manufacturer:
            required: true
            type: string
    secrets:
        auto_update_token:
            required: true

jobs:
  check-torizon-bsp-updates:
    name: Check for Torizon bsp updates
    runs-on: [self-hosted]
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout torizon-optologic
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0
          ref: 'torizon-${{ inputs.manufacturer }}-7.x.y'

      - name: Check for toradex revision updates
        id: check-for-toradex-revision-updates
        run: |
            set +e
            .github/scripts/check-toradex-revision-updates.sh
            exit_code="$?"
            echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
            if [[ $exit_code -eq 1 ]]; then
                exit 1
            fi

      - name: Check for closed pull request on the toradex-${{ inputs.manufacturer }}-update/${{steps.check-for-toradex-revision-updates.outputs.latest_stable_tag}} branch
        if: steps.check-for-toradex-revision-updates.outputs.exit_code == '2'
        id: find-revision-pull-request
        uses: juliangruber/find-pull-request-action@v1
        with:
            state: closed
            branch: toradex-${{ inputs.manufacturer }}-manifest-update/${{steps.check-for-toradex-revision-updates.outputs.latest_stable_tag}}

      - name: Open a pull request with the updated BSP
        if: steps.check-for-toradex-revision-updates.outputs.exit_code == '2' && steps.find-revision-pull-request.outputs.matching-pr-count == 0
        id: cpr-bsp
        uses: peter-evans/create-pull-request@v8
        with:
            token: ${{ secrets.auto_update_token }}
            commit-message: ".github:workflows: update to Toradex revision ${{steps.check-for-toradex-revision-updates.outputs.latest_stable_tag}} version"
            title: "${{ inputs.manufacturer }}: Update Toradex BSP revision to the ${{steps.check-for-toradex-revision-updates.outputs.latest_stable_tag}} version"
            body: This pull request updates the Toradex BSP revision to the ${{steps.check-for-toradex-revision-updates.outputs.latest_stable_tag}} version.
            branch: toradex-${{ inputs.manufacturer }}-manifest-update/${{steps.check-for-toradex-revision-updates.outputs.latest_stable_tag}}
            signoff: true

      - name: Output pull request details
        if: ${{ steps.cpr-bsp.outputs.pull-request-number }}
        run: |
          echo "Pull Request Number - ${{ steps.cpr-bsp.outputs.pull-request-number }}"
          echo "Pull Request URL - ${{ steps.cpr-bsp.outputs.pull-request-url }}"
