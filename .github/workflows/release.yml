name: Torizon Optologic Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-torizon-optologic:
    name: Tag and release torizon-optologic
    runs-on: [ubuntu-latest]
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        manufacturer: [nxp, ti]

    steps:
      - name: Checkout torizon-optologic
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: "torizon-${{ matrix.manufacturer }}-7.x.y"

      - name: Get latest tag
        id: latest_tag
        run: |
          tag=$(git describe --tags --abbrev=0 2>/dev/null || true)

          if [ -z "$tag" ]; then
              echo "No existing tag found"
              tag=""
          fi

          echo "latest_tag=$tag" >> $GITHUB_OUTPUT

      - name: Check for new commits since last tag
        id: check_changes
        run: |
          if [ -z "${{ steps.latest_tag.outputs.latest_tag }}" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          commits=$(git rev-list ${{ steps.latest_tag.outputs.latest_tag }}..HEAD --count)

          if [ "$commits" -eq 0 ]; then
            echo "No new commits since last tag ${{ steps.latest_tag.outputs.latest_tag }}, no need for a new tag and release."
            echo "changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "changes=true" >> $GITHUB_OUTPUT

      - name: Read Toradex tag
        id: toradex
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          TAG=$(grep -oP 'version:\s*"\K[^"]+' template/torizon-dtb-overlay-${{ matrix.manufacturer }}.yaml.tpl)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Generate tag
        id: tag
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          BASE="torizon-${{ matrix.manufacturer }}-${{ steps.toradex.outputs.tag }}-optologic"

          existing=$(git tag -l "${BASE}-*")
          if [ -z "$existing" ]; then
            version="1.0"
          else
            last=$(echo "$existing" | sed "s/${BASE}-//" | sort -V | tail -n1)

            major=$(echo $last | cut -d. -f1)
            minor=$(echo $last | cut -d. -f2)

            minor=$((minor + 1))
            version="${major}.${minor}"
          fi

          new_tag="${BASE}-${version}"

          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT
          echo "Generated tag: $new_tag"

      - name: Create Git tag
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag ${{ steps.tag.outputs.new_tag }}
          git push origin ${{ steps.tag.outputs.new_tag }}

      - name: Create GitHub Release
        if: steps.check_changes.outputs.changes == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: Release ${{ steps.tag.outputs.new_tag }}
          generate_release_notes: true
          files: '*'
