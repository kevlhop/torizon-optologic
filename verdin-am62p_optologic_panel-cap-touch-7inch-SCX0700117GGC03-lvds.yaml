# Toradex Easy Installer Configuration with OPTO Logic 7inch-SCX0700117GGC03 Display and Touchscreen for verdin-am62p

input:
  easy-installer:
    toradex-feed:
      version: "7.6.0-devel-202603"
      release: quarterly
      machine: verdin-am62p
      distro: torizon
      variant: torizon-docker
      build-number: "36"

customization:
  device-tree:
    include-dirs:
      - linux-toradex/include
      - linux-toradex/arch/arm64/boot/dts/ti
      - device-tree-overlays-optologic
    overlays:
      remove:
        - verdin-am62p_dsi-to-hdmi_overlay.dtbo
      add:
        - device-tree-overlays-optologic/verdin-am62p_optologic_panel-cap-touch-7inch-SCX0700117GGC03-lvds_overlay.dts

output:
  easy-installer:
    local: build/torizon_verdin-am62p_optologic_panel-cap-touch-7inch-SCX0700117GGC03-lvds_Tezi_7.6.0-devel-202603
    name: "Toradex verdin-am62p with OPTO Logic 7inch-SCX0700117GGC03 Display and Touchscreen"
